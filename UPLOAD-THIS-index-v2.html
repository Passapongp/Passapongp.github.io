document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

/div>\n    <a href=\"#contact\" style=\"background:#C8922A;color:#fff;padding:10px 22px;border-radius:7px;font-size:14px;font-weight:600;transition:background .2s\" style-hover=\"background:#E5B04A\">นัด Discovery Call ฟรี</a>\n  </div>\n</nav>\n\n<!-- HERO -->\n<section style=\"background:radial-gradient(ellipse 90% 70% at 50% 0%,#1a3568 0%,#0f2249 45%,#0A1A38 100%);color:#fff;padding:176px 28px 116px;text-align:center;position:relative;overflow:hidden\">\n  <div style=\"position:absolute;top:-10%;left:50%;transform:translateX(-50%);width:640px;height:640px;background:radial-gradient(circle,rgba(200,146,42,0.14) 0%,transparent 62%);pointer-events:none;animation:floatGlow 9s ease-in-out infinite\"></div>\n  <div style=\"position:relative\">\n    <div style=\"display:inline-flex;align-items:center;gap:10px;background:rgba(200,146,42,0.12);border:1px solid rgba(200,146,42,0.4);color:#E5B04A;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:8px 22px;border-radius:100px;margin-bottom:38px\">Business Growth Consultant · SME Specialist</div>\n    <h1 style=\"font-family:'Playfair Display','Noto Serif Thai',serif;font-size:clamp(46px,6.6vw,78px);font-weight:700;line-height:1.06;margin-bottom:26px;max-width:840px;margin-left:auto;margin-right:auto\">Turn Strategy<br>Into <em style=\"font-style:italic;color:#E5B04A\">Real Revenue.</em></h1>\n    <p style=\"font-size:clamp(16px,2vw,20px);color:rgba(255,255,255,0.74);max-width:620px;margin:0 auto 48px;font-weight:300;line-height:1.8\">ที่ปรึกษาธุรกิจ 15+ ปีประสบการณ์ระดับ Executive ช่วย SME วางกลยุทธ์เติบโต สร้าง Revenue Stream ใหม่ และเปิด Partnership ที่ใช่ — โดยไม่ต้องจ้าง Director เต็มเวลา</p>\n    <div style=\"display:flex;gap:14px;justify-content:center;flex-wrap:wrap\">\n      <a href=\"#packages\" style=\"background:#C8922A;color:#fff;padding:17px 38px;border-radius:9px;font-size:16px;font-weight:600;transition:all .22s;display:inline-flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(200,146,42,.28)\" style-hover=\"background:#E5B04A;transform:translateY(-2px);box-shadow:0 12px 34px rgba(200,146,42,.42)\">ดู Package ทั้งหมด →</a>\n      <a href=\"#about\" style=\"border:1.5px solid rgba(255,255,255,0.28);color:rgba(255,255,255,0.88);padding:17px 38px;border-radius:9px;font-size:16px;font-weight:500;transition:all .22s\" style-hover=\"border-color:#C8922A;color:#E5B04A\">รู้จักผมก่อน</a>\n    </div>\n  </div>\n</section>\n\n<!-- STATS -->\n<div style=\"background:#fff;border-bottom:1px solid #ECEAE4;padding:52px 28px\">\n  <div style=\"max-width:1120px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:28px;text-align:center\">\n    <sc-for list=\"{{stats}}\" as=\"s\" hint-placeholder-count=\"4\">\n      <div>\n        <div style=\"font-family:'Playfair Display','Noto Serif Thai',serif;font-size:46px;font-weight:700;color:#0D1F42;line-height:1;margin-bottom:10px\">{{s.num}}<span style=\"color:#C8922A\">{{s.sup}}</span></div>\n        <div style=\"font-size:13px;color:#6B7280;line-height:1.5\">{{s.label}}</div>\n      </div>\n    </sc-for>\n  </div>\n</div>\n\n<!-- TRUST STRIP -->\n<div style=\"background:#0D1F42;padding:34px 28px;border-bottom:1px solid rgba(200,146,42,0.15)\">\n  <div style=\"max-width:1120px;margin:0 auto;text-align:center\">\n    <div style=\"font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(200,146,42,0.85);margin-bottom:22px\">ได้ร่วมงานกับองค์กรชั้นนำ</div>\n    <div style=\"display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:14px 40px\">\n      <sc-for list=\"{{clients}}\" as=\"c\" hint-placeholder-count=\"6\">\n        <div style=\"background:#fff;border-radius:12px;padding:12px 20px;display:flex;align-items:center;justify-content:center;min-width:110px;height:60px\">\n          <img src=\"{{c.src}}\" alt=\"{{c.name}}\" style=\"max-height:34px;max-width:130px;object-fit:contain;display:block\">\n        </div>\n      </sc-for>\n    </div>\n  </div>\n</div>\n\n<!-- PAIN POINTS -->\n<section style=\"background:#F9F7F4;padding:100px 28px;scroll-margin-top:80px\">\n  <div style=\"max-width:1120px;margin:0 auto\">\n    <div style=\"font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#C8922A;margin-bottom:14px\">คุณกำลังเจอปัญหาเหล่านี้ไหม?</div>\n    <h2 style=\"font-family:'Playfair Display','Noto Serif Thai',serif;font-size:clamp(30px,4vw,48px);font-weight:700;color:#0D1F42;line-height:1.2;margin-bottom:16px\">ธุรกิจโต แต่ไม่รู้<br>จะไปทางไหน</h2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-top:56px\">\n      <sc-for list=\"{{pains}}\" as=\"p\" hint-placeholder-count=\"6\">\n        <div style=\"background:#fff;border-radius:16px;padding:34px 30px;border:1px solid #ECEAE4;transition:box-shadow .25s,transform .25s\" style-hover=\"box-shadow:0 16px 44px rgba(13,31,66,0.1);transform:translateY(-4px)\">\n          <div style=\"width:52px;height:52px;background:#F4F1EB;border:1px solid #ECE7DC;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:22px\">{{p.icon}}</div>\n          <h3 style=\"font-size:19px;font-weight:700;color:#0D1F42;margin-bottom:10px;line-height:1.45\">{{p.title}}</h3>\n          <p style=\"font-size:16px;color:#6B7280;line-height:1.7\">{{p.desc}}</p>\n        </div>\n      </sc-for>\n    </div>\n  </div>\n</section>\n\n<!-- ABOUT -->\n<section id=\"about\" style=\"padding:100px 28px;scroll-margin-top:70px\">\n  <div style=\"max-width:1120px;margin:0 auto\">\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:72px;align-items:center\">\n      <div>\n        <div style=\"font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#C8922A;margin-bottom:14px\">About</div>\n        <h2 style=\"font-family:'Playfair Display','Noto Serif Thai',serif;font-size:clamp(30px,4vw,46px);font-weight:700;color:#0D1F42;line-height:1.2;margin-bottom:24px\">15 ปีในสนามจริง<br>ไม่ใช่แค่ทฤษฎี</h2>\n        <p style=\"font-size:18px;color:#4B5563;line-height:1.9;margin-bottom:18px\">ผม Passapong Plikaphan (Bank) — อดีต Executive Business Development Director ที่ YDM Thailand บริษัท Digital Marketing ชั้นนำของไทย ผ่านการวางกลยุทธ์และ execute โปรเจคจริงให้ลูกค้าหลากหลาย industry กว่า 15 ปี</p>\n        <p style=\"font-size:18px;color:#4B5563;line-height:1.9;margin-bottom:18px\">ประสบการณ์ไม่ได้อยู่แค่ในห้องประชุม — แต่อยู่ในการทำให้ธุรกิจเติบโตได้จริง สร้าง revenue stream ใหม่ เปิด partnership กับองค์กรใหญ่ และ transform ธุรกิจเข้าสู่ digital ได้อย่างมีผลลัพธ์ชัดเจน</p>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:26px\">\n          <sc-for list=\"{{tags}}\" as=\"t\" hint-placeholder-count=\"6\">\n            <span style=\"background:rgba(13,31,66,0.05);color:#0D1F42;padding:8px 16px;border-radius:100px;font-size:13px;font-weight:600;border:1px solid rgba(13,31,66,0.08)\">{{t}}</span>\n          </sc-for>\n        </div>\n      </div>\n      <div style=\"background:linear-gradient(160deg,#12264d 0%,#0D1F42 100%);border-radius:22px;padding:44px 40px;color:#fff;box-shadow:0 24px 60px rgba(13,31,66,0.22);border:1px solid rgba(200,146,42,0.14)\">\n        <sc-for list=\"{{highlights}}\" as=\"h\" hint-placeholder-count=\"4\">\n          <div style=\"padding:20px 0;border-bottom:1px solid rgba(255,255,255,0.1)\">\n            <div style=\"font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#E5B04A;margin-bottom:8px\">{{h.label}}</div>\n            <div style=\"font-size:17px;color:rgba(255,255,255,0.84);line-height:1.65\">{{h.text}}</div>\n          </div>\n        </sc-for>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- RESULTS -->\n<section style=\"background:#0D1F42;color:#fff;padding:100px 28px\">\n  <div style=\"max-width:1120px;margin:0 auto\">\n    <div style=\"font-size:11px;font-weight:700 { name: \"Zwiz.AI\", src: \"logos/zwiz.png\" },\n    { name: \"Buzzebees\", src: \"logos/buzzebees.png\" },\n    { name: \"Sable\", src: \"logos/sable.png\" },\n    { name: \"Connect X\", src: \"logos/connectx.png\" },\n    { name: \"Zoho\", src: \"logos/zoho.png\" }\n  ];\n\n  PAINS = [\n    { icon: '🎯', title: 'ไม่รู้จะขยายธุรกิจไปทิศทางไหน', desc: 'มี idea เยอะ แต่ไม่แน่ใจว่าควรโฟกัสอะไรก่อน ทำแล้วยังวนเวียนอยู่ที่เดิม' },\n    { icon: '💸', title: 'ทำการตลาดแต่ไม่เห็น ROI ชัดเจน', desc: 'ใช้งบโฆษณาทุกเดือน แต่ไม่รู้ว่าอะไรได้ผลจริง ลูกค้าใหม่มาน้อยลง' },\n    { icon: '🤝', title: 'อยาก scale แต่ขาด connection ที่ใช่', desc: 'รู้ว่าต้องหา partner หรือ channel ใหม่ แต่ไม่รู้จะเริ่มจากไหน' },\n    { icon: '📊', title: 'Product ดี แต่ positioning ไม่โดน', desc: 'ลูกค้าไม่เข้าใจว่าเราต่างจากคู่แข่งยังไง ทำให้แข่งกันแค่เรื่องราคา' },\n    { icon: '🚀', title: 'อยากเข้า digital แต่ไม่รู้จะเริ่มตรงไหน', desc: 'รู้ว่า digital transformation จำเป็น แต่กลัวลงทุนผิดทาง' },\n    { icon: '👥', title: 'ไม่มีคนที่มีประสบการณ์ Strategy ระดับ Corporate', desc: 'อยากได้มุมมองจาก executive ที่ผ่านงานจริง โดยไม่ต้องจ้าง full-time' },\n  ];\n\n  TAGS = ['Digital Strategy', 'Business Development', 'Brand Strategy', 'Go-to-Market', 'Partnership', 'Project Management'];\n\n  HIGHLIGHTS = [\n    { label: 'ประสบการณ์', text: '15+ ปีในฐานะ Executive BD Director — YDM Thailand บริษัท Digital Marketing ชั้นนำ' },\n    { label: 'Industries ที่มีประสบการณ์', text: 'Insurance · Pharma · Healthcare · Tourism · Real Estate · Education · Automotive · FMCG' },\n    { label: 'ความเชี่ยวชาญหลัก', text: 'วางกลยุทธ์ Digital-First · สร้าง Revenue Stream ใหม่ · เจรจา Strategic Partnership · Brand Repositioning' },\n    { label: 'สิ่งที่ทำให้ต่างจากที่ปรึกษาทั่วไป', text: 'ไม่ได้แค่แนะนำ — ลงมือทำจริงร่วมกับทีมลูกค้าตลอดโปรเจค และรับผิดชอบผลลัพธ์ร่วมกัน' },\n  ];\n\n  CASES = [\n    { industry: 'Automotive Platform', result: '60M+ บาท', desc: 'สร้าง Car Buddy App — platform จับคู่ผู้ซื้อ-ผู้ขายรถมือสอง ตั้งแต่ concept จนถึง revenue จริง บริหารทีม 20+ คน' },\n    { industry: 'Real Estate + Automotive (Digital)', result: '2 Virtual Expos', desc: 'ออกแบบและ execute Virtual Motor Show + Virtual Property Expo ช่วง COVID สร้าง revenue ให้ลูกค้าโดยไม่ต้องมีงาน physical' },\n    { industry: 'Insurance', result: 'Brand Repositioned', desc: 'วาง Brand Strategy ใหม่ให้ Thipaya Insurance — reposition จาก product-led เป็น customer-led เพื่อแข่งขันในตลาดที่เปลี่ยนไป' },\n    { industry: 'Pharmaceutical', result: 'Distribution Expanded', desc: 'วางกลยุทธ์ distribution ใหม่ทั้ง online และ offline ให้ Thainarkhonpattana Pharma ขยาย channel อย่างเป็นระบบ' },\n    { industry: 'Tourism', result: 'National Campaign', desc: 'ออกแบบ Digital Strategy ให้ TAT (การท่องเที่ยวแห่งประเทศไทย) เชื่อมโยง online content กับ offline experience' },\n    { industry: 'Education', result: 'Brand Revitalized', desc: 'ช่วย Bangkok University วาง Communication Strategy ใหม่ดึงดูดนักศึกษากลุ่มใหม่ในยุค digital-first' },\n  ];\n\n  FORWHO = [\n    { title: 'เจ้าของ SME ที่อยากโต แต่ไม่รู้ทิศทาง', desc: 'Revenue 10–200 ล้าน/ปี พร้อมลงทุนกับกลยุทธ์ที่ใช่และวัดผลได้จริง' },\n    { title: 'ธุรกิจที่ต้องการ Digital Transformation จริงจัง', desc: 'อยากย้ายจาก offline-heavy ไปสู่ digital โดยไม่เสียตัวตนเดิม' },\n    { title: 'ธุรกิจที่ต้องการเปิด Channel หรือ Partnership ใหม่', desc: 'ต้องการ network และ connection ที่ช่วย unlock โอกาสใหม่ได้จริง' },\n    { title: 'Startup ที่ต้องการ BD Mentor ระดับ Executive', desc: 'ต้องการคนที่เคย build และ scale ธุรกิจจริงมาช่วยชี้ทิศทาง' },\n    { title: 'ธุรกิจที่กำลัง Reposition หรือเข้า Market ใหม่', desc: 'ต้องการ strategy ที่รอบคอบก่อนลงทุนใหญ่และลดความเสี่ยง' },\n    { title: 'ผู้บริหารที่ต้องการ Sounding Board ระดับ Executive', desc: 'ต้องการคนที่คุยได้ในระดับกลยุทธ์ ไม่ใช่แค่ execution' },\n  ];\n\n  FAQ = [\n    { q: 'จะรู้ได้ยังไงว่า consulting กับคุณ Bank คุ้มค่า?', a: 'เริ่มจาก Discovery Call ฟรี 30 นาทีก่อนตัดสินใจ ในนั้นผมจะฟังปัญหาของคุณและบอกตรงๆ ว่าสามารถช่วยได้จริงมากแค่ไหน ถ้าไม่ใช่ scope ที่ผมถนัด ผมจะบอกตรงๆ ไม่รับงานที่ช่วยได้ไม่เต็มที่ครับ' },\n    { q: 'ทำไมต้อง minimum 3 เดือน?', a: 'กลยุทธ์ที่ดีต้องใช้เวลา เดือนแรกคือ audit และวาง plan ที่รัดกุม เดือนสองคือ execute และ adjust ตามสถานการณ์จริง เดือนสามคือวัดผลและ optimize ถ้าน้อยกว่านั้น คุณจะได้แค่ advice แต่ไม่ได้ผลลัพธ์ที่วัดได้ครับ' },\n    { q: 'on-site visit ครอบคลุมพื้นที่ไหนบ้าง?', a: 'ปัจจุบันให้บริการในเขต กรุงเทพฯ และปริมณฑลเป็นหลัก สำหรับต่างจังหวัดสามารถปรึกษาได้เป็นกรณีๆ ไป โดยอาจมีค่าเดินทางเพิ่มเติม หรือสลับเป็น video call แทนบางครั้งได้ครับ' },\n    { q: 'รับลูกค้าพร้อมกันกี่รายต่อเดือน?', a: 'เพื่อรักษาคุณภาพ ผมรับลูกค้า active พร้อมกันไม่เกิน 4–5 ราย เพื่อให้แน่ใจว่าทุกคนได้รับความใส่ใจอย่างเต็มที่ ดังนั้นขอแนะนำให้ติดต่อล่วงหน้าเพื่อไม่เสียโอกาสครับ' },\n    { q: 'ถ้าอยากหยุดก่อนครบ 3 เดือนได้ไหม?', a: 'Contract ระบุ minimum 3 เดือน แต่ถ้าไม่พอใจในผลลัพธ์ภายในเดือนแรก สามารถพูดคุยได้ครับ ผมให้ความสำคัญกับความสัมพันธ์ระยะยาวมากกว่าการรั้งลูกค้าที่ไม่ happy' },\n  ];\n\n  toggle(i) {\n    this.setState(s => ({ open: { ...s.open, [i]: !s.open[i] } }));\n  }\n\n  renderVals() {\n    const open = this.state.open || {};\n    return {\n      stats: this.STATS,\n      clients: this.CLIENTS,\n      partners: this.PARTNERS,\n      pains: this.PAINS,\n      tags: this.TAGS,\n      highlights: this.HIGHLIGHTS,\n      cases: this.CASES,\n      forwho: this.FORWHO,\n      faqs: this.FAQ.map((f, i) => ({\n        q: f.q,\n        a: f.a,\n        open: !!open[i],\n        rotate: open[i] ? 'rotate(45deg)' : 'rotate(0deg)',\n        toggle: () => this.toggle(i),\n      })),\n    };\n  }\n}\n<\u002Fscript>\n\n\n</body></html>"</script>
