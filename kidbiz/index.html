  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ขา <span style=\"position: relative; display: inline-block; color: #F2703A;\">เรื่องเงิน?<span style=\"position: absolute; left: 0; right: 0; bottom: 2px; height: 12px; background: #FFC93C; z-index: -1; border-radius: 6px;\"><\u002Fspan><\u002Fspan>\n        <\u002Fh1>\n        <p style=\"font-size: 19px; line-height: 1.7; margin: 0 0 30px; max-width: 540px; color: #4A5563;\">\n          Workshop ที่เด็กได้คิดสินค้าจากสิ่งที่รัก สร้างแบรนด์ของตัวเอง เปิดร้านขายให้ลูกค้าจริง นับกำไรด้วยมือตัวเอง — แล้วเรียนรู้ที่จะ <strong>ออม ใช้ และแบ่งปัน<\u002Fstrong> อย่างคนที่เข้าใจค่าของเงิน\n        <\u002Fp>\n        <div style=\"display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px;\">\n          <a href=\"#cta\" style=\"background: #0E8A7B; color: #FFF9EE; font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 18px; padding: 15px 32px; border-radius: 999px; border: 3px solid #2B3440; box-shadow: 4px 4px 0 #2B3440; display: inline-block;\" style-hover=\"transform: translate(2px,2px); box-shadow: 2px 2px 0 #2B3440; color: #FFF9EE;\">จองที่นั่ง Workshop รุ่นแรก<\u002Fa>\n          <a href=\"#programs\" style=\"background: #FFF9EE; color: #2B3440; font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 18px; padding: 15px 32px; border-radius: 999px; border: 3px solid #2B3440; box-shadow: 4px 4px 0 #2B3440; display: inline-block;\" style-hover=\"transform: translate(2px,2px); box-shadow: 2px 2px 0 #2B3440; color: #2B3440;\">ดูโปรแกรมทั้งหมด<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 18px; flex-wrap: wrap; font-size: 14.5px; font-weight: 600; color: #6B7684;\">\n          <span>✓ รับเพียง 18 คน<\u002Fspan>\n          <span>✓ สอนสองภาษา ไทย–อังกฤษ<\u002Fspan>\n          <span>✓ กำไรเป็นของเด็ก 100%<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position: relative;\">\n        <div style=\"position: absolute; top: -26px; right: -14px; width: 74px; height: 74px; border-radius: 50%; background: #FFC93C; border: 3px solid #2B3440; animation: bob 4s ease-in-out infinite; z-index: 2; display: grid; place-items: center; font-size: 30px;\">🍋<\u002Fdiv>\n        <div style=\"position: absolute; bottom: -20px; left: -22px; width: 56px; height: 56px; background: #F2703A; border: 3px solid #2B3440; border-radius: 14px; transform: rotate(12deg); z-index: 2; display: grid; place-items: center; font-size: 24px;\">฿<\u002Fdiv>\n        <div style=\"position: relative; border: 3px solid #2B3440; border-radius: 28px; box-shadow: 8px 8px 0 #FFC93C; overflow: hidden; background: #E4F5EF; width: 100%; aspect-ratio: 4 / 3.4;\">\n          <image-slot id=\"hero-photo\" shape=\"rect\" placeholder=\"รูปเด็กเปิดร้าน Market Day\"><\u002Fimage-slot>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height: 44px; background: #2B3440; border-radius: 100% 100% 0 0 / 44px 44px 0 0; margin-top: -44px; position: relative; transform: translateY(44px);\"><\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- STATS STRIP -->\n  <sc-if value=\"{{ showStats }}\" hint-placeholder-val=\"{{ true }}\">\n    <section data-screen-label=\"Stats\" style=\"background: #2B3440; color: #FFF9EE; padding: 64px 24px 56px;\">\n      <div style=\"max-width: 1140px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; text-align: center;\">\n        <div>\n          <div style=\"font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 46px; color: #FFC93C;\">~90%<\u002Fdiv>\n          <p style=\"margin: 6px 0 0; font-size: 15.5px; line-height: 1.6; color: #C7CEDA;\">หนี้ครัวเรือนไทยต่อ GDP — ผู้ใหญ่จำนวนมากไม่เคยถูกสอนเรื่องเงิน<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 46px; color: #FFC93C;\">0 ชั่วโมง<\u002Fdiv>\n          <p style=\"margin: 6px 0 0; font-size: 15.5px; line-height: 1.6; color: #C7CEDA;\">วิชา \"การเงินส่วนบุคคล\" ในหลักสูตรพื้นฐานของไทย<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 46px; color: #FFC93C;\">4.1 ล้านคน/ปี<\u002Fdiv>\n          <p style=\"margin: 6px 0 0; font-size: 15.5px; line-height: 1.6; color: #C7CEDA;\">เด็กทั่วโลกที่เรียนทักษะการเงินผ่านโปรแกรมแบบเดียวกันนี้ใน 116 ประเทศ<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"text-align: center; margin: 34px 0 0; font-size: 12.5px; color: #8B94A3;\">อ้างอิง: NESDC · OECD/PISA · Aflatoun International<\u002Fp>\n    <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- PROGRAMS -->\n  <section id=\"programs\" data-screen-label=\"Programs\" style=\"background: #FFF9EE; padding: 90px 24px 80px; position: relative;\">\n    <div style=\"max-width: 1140px; margin: 0 auto;\">\n      <div style=\"text-align: center; margin-bottom: 52px;\">\n        <div style=\"display: inline-block; background: #FFC93C; border: 2px solid #2B3440; border-radius: 999px; padding: 6px 18px; font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 1px; margin-bottom: 16px;\">PROGRAMS<\u002Fdiv>\n        <h2 style=\"font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 40px; margin: 0 0 14px; color: #2B3440;\">เลือกจุดเริ่มต้นที่เหมาะกับลูกคุณ<\u002Fh2>\n        <p style=\"font-size: 17px; line-height: 1.7; max-width: 640px; margin: 0 auto; color: #4A5563;\">ทุกโปรแกรมใช้หลักเดียวกัน: เด็กเรียนรู้จากการ<strong>ลงมือทำจริง<\u002Fstrong> ไม่ใช่จากสไลด์ — ออกแบบตามแนวทางโปรแกรมชั้นนำระดับโลก<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 26px; align-items: stretch;\">\n\n        <div style=\"background: #FFFFFF; border: 3px solid #2B3440; border-radius: 24px; box-shadow: 6px 6px 0 #F2703A; padding: 30px 28px; display: flex; flex-direction: column; gap: 14px; position: relative;\">\n          <div style=\"position: absolute; top: -16px; left: 24px; white-space: nowrap; background: #F2703A; color: #FFF9EE; border: 2px solid #2B3440; border-radius: 999px; padding: 4px 14px; font-size: 12.5px; font-weight: 700;\">เปิดรับสมัคร · รอบ PILOT<\u002Fdiv>\n          <div style=\"font-size: 42px; margin-top: 10px;\">🏪<\u002Fdiv>\n          <h3 style=\"font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 24px; margin: 0; color: #2B3440;\">My First Business Day<\u002Fh3>\n          <p style=\"margin: 0; font-size: 15px; line-height: 1.7; color: #4A5563;\">Workshop 1 วันเต็ม — เด็กคิดสินค้าจากสิ่งที่ชอบ ตั้งราคา กู้ทุนจริงจาก \"ธนาคาร\" เปิดร้านขายใน Market Day แล้วปิดวันด้วยการนับกำไรและแบ่งเงินใส่ซอง 3 ใบด้วยตัวเอง<\u002Fp>\n          <ul style=\"margin: 0; padding: 0 0 0 2px; list-style: none; display: flex; flex-direction: column; gap: 8px; font-size: 14.5px; font-weight: 500; color: #2B3440;\">\n            <li>✓ อายุ 9–13 ปี · กลุ่มละ 16–18 คน<\u002Fli>\n            <li>✓ ทุนตั้งร้านจริง + คูปองลูกค้าสำหรับผู้ปกครอง<\u002Fli>\n            <li>✓ กำไรเป็นของเด็ก 100%<\u002Fli>\n          <\u002Ful>\n          <div style=\"margin-top: auto; padding-top: 12px;\">\n            <div style=\"font-size: 14px; color: #6B7684;\"><s>3,500.-<\u002Fs> / คน · รอบ Pilot<\u002Fdiv>\n            <div style=\"font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 28px; color: #F2703A;\">2,900.-<\u002Fdiv>\n            <a href=\"#cta\" style=\"display: block; text-align: center; margin-top: 14px; background: #F2703A; color: #FFF9EE; font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 16px; padding: 12px 0; border-radius: 999px; border: 3px solid #2B3440; box-shadow: 3px 3px 0 #2B3440;\" style-hover=\"transform: translate(2px,2px); box-shadow: 1px 1px 0 #2B3440; color: #FFF9EE;\">จองที่นั่ง<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background: #FFFFFF; border: 3px solid #2B3440; border-radius: 24px; box-shadow: 6px 6px 0 #0E8A7B; padding: 30px 28px; display: flex; flex-direction: column; gap: 14px; position: relative;\">\n          <div style=\"position: absolute; top: -16px; left: 24px; white-space: nowrap; background: #E4F5EF; color: #0B6E63; border: 2px solid #2B3440; border-radius: 999px; padding: 4px 14px; font-size: 12.5px; font-weight: 700;\">เร็ว ๆ นี้<\u002Fdiv>\n          <div style=\"font-size: 42px; margin-top: 10px;\">🚀<\u002Fdiv>\n          <h3 style=\"font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 24px; margin: 0; color: #2B3440;\">Young Founder Course<\u002Fh3>\n          <p style=\"margin: 0; font-size: 15px; line-height: 1.7; color: #4A5563;\">คอร์ส 6 สัปดาห์ สร้างธุรกิจจริงจาก passion ของเด็กแต่ละคน — ค้นหาตัวเอง ปั้นแบรนด์ ขายจริงกลางคอร์ส และปิดท้ายด้วย Demo Day ขึ้นเวที pitch ต่อหน้าครอบครัว<\u002Fp>\n          <ul style=\"margin: 0; padding: 0 0 0 2px; list-style: none; display: flex; flex-direction: column; gap: 8px; font-size: 14.5px; font-weight: 500; color: #2B3440;\">\n            <li>✓ สัปดาห์ละ 1 ครั้ง × 6 สัปดาห์<\u002Fli>\n            <li>✓ Mentor ประกบทีมเล็ก<\u002Fli>\n            <li>✓ สมุดบัญชีธุรกิจเล่มแรกของลูก<\u002Fli>\n          <\u002Ful>\n          <div style=\"margin-top: auto; padding-top: 12px;\">\n            <div style=\"font-size: 14px; color: #6B7684;\">เปิดจองหลังรอบ Pilot<\u002Fdiv>\n            <div style=\"font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 22px; color: #0E8A7B;\">Waitlist เปิดแล้ว<\u002Fdiv>\n            <a href=\"#cta\" style=\"display: block; text-align: center; margin-top: 14px; background: #FFFFFF; color: #2B3440; font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 16px; padding: 12px 0; border-radius: 999px; border: 3px solid #2B3440; box-shadow: 3px 3px 0 #2B3440;\" style-hover=\"transform: translate(2px,2px); box-shadow: 1px 1px 0 #2B3440; color: #2B3440;\">ลงชื่อรอ<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background: #FFFFFF; border: 3px solid #2B3440; border-radius: 24px; box-shadow: 6px 6px 0 #FFC93C; padding: 30px 28px; display: flex; flex-direction: column; gap: 14px; position: relative;\">\n          <div style=\"position: absolute; top: -16px; left: 24px; white-space: nowrap; background: #FFC93C; color: #2B3440; border: 2px solid #2B3440; border-radius: 999px; padding: 4px 14px; font-size: 12.5px; font-weight: 700;\">สำหรับโรงเรียน<\u002Fdiv>\n          <div style=\"font-size: 42px; margin-top: 10px;\">🏫<\u002Fdiv>\n          <h3 style=\"font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 24px; margin: 0; color: #2B3440;\">School Program<\u002Fh3>\n          <p style=\"margin: 0; font-size: 15px; line-height: 1.7; color: #4A5563;\">ยก Market Day และหลักสูตรการเงินไปจัดในโรงเรียน EP / Bilingual / International เป็นกิจกรรม enrichment หรือ after-school — ออกแบบร่วมกับฝ่ายวิชาการได้<\u002Fp>\n          <ul style=\"margin: 0; padding: 0 0 0 2px; list-style: none; display: flex; flex-direction: column; gap: 8px; font-size: 14.5px; font-weight: 500; color: #2B3440;\">\n            <li>✓ สอนสองภาษา ไทย–อังกฤษ<\u002Fli>\n            <li>✓ ปรับเนื้อหาตามช่วงวัย ป.4–ม.3<\u002Fli>\n            <li>✓ รายงานผลลัพธ์รายบุคคลถึงผู้ปกครอง<\u002Fli>\n          <\u002Ful>\n          <div style=\"margin-top: auto; padding-top: 12px;\">\n            <div style=\"font-size: 14px; color: #6B7684;\">ราคาตามรูปแบบงาน<\u002Fdiv>\n            <div style=\"font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 22px; color: #2B3440;\">นัดคุยกับทีมเรา<\u002Fdiv>\n            <a href=\"#cta\" style=\"display: block; text-align: center; margin-top: 14px; background: #FFFFFF; color: #2B3440; font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 16px; padding: 12px 0; border-radius: 999px; border: 3px solid #2B3440; box-shadow: 3px 3px 0 #2B3440;\" style-hover=\"transform: translate(2px,2px); box-shadow: 1px 1px 0 #2B3440; color: #2B3440;\">ติดต่อเรา<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HOW KIDS LEARN -->\n  <section id=\"how\" data-screen-label=\"How Kids Learn\" style=\"background: #E4F5EF; padding: 90px 24px 80px; border-top: 3px solid #2B3440; border-bottom: 3px solid #2B3440;\">\n    <div style=\"max-width: 1140px; margin: 0 auto;\">\n      <div style=\"text-align: center; margin-bottom: 52px;\">\n        <div style=\"display: inline-block; background: #0E8A7B; color: #FFF9EE; border: 2px solid #2B3440; border-radius: 999px; padding: 6px 18px; font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 1px; margin-bottom: 16px;\">HOW KIDS LEARN<\u002Fdiv>\n        <h2 style=\"font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 40px; margin: 0 0 14px; color: #2B3440;\">วงจรการเรียนรู้ 6 ขั้น — ลงมือก่อน แล้วค่อยตกผลึก<\u002Fh2>\n        <p style=\"font-size: 17px; line-height: 1.7; max-width: 680px; margin: 0 auto; color: #4A5563;\">เราไม่สอนคำว่า \"ต้นทุน\" จากกระดาน — เด็กจะค้นพบมันเองตอนนับเงินหลังปิดร้าน นี่คือสิ่งที่วิดีโอฟรีบนอินเทอร์เน็ตให้ไม่ได้<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;\">\n        <sc-for list=\"{{ steps }}\" as=\"step\" hint-placeholder-count=\"6\">\n          <div style=\"background: #FFFFFF; border: 3px solid #2B3440; border-radius: 20px; padding: 26px 24px; display: flex; flex-direction: column; gap: 10px; box-shadow: 4px 4px 0 rgba(43,52,64,0.15);\">\n            <div style=\"display: flex; align-items: center; gap: 12px;\">\n              <span style=\"width: 40px; height: 40px; border-radius: 50%; background: #FFC93C; border: 2.5px solid #2B3440; display: grid; place-items: center; font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 18px; flex-shrink: 0;\">{{ step.n }}<\u002Fspan>\n              <span style=\"font-size: 26px;\">{{ step.emoji }}<\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 20px; margin: 0; color: #2B3440;\">{{ step.title }}<\u002Fh3>\n            <p style=\"margin: 0; font-size: 14.5px; line-height: 1.7; color: #4A5563;\">{{ step.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MONEY SKILLS -->\n  <section id=\"money\" data-screen-label=\"Money Skills\" style=\"background: #FFF9EE; padding: 90px 24px 80px;\">\n    <div style=\"max-width: 1140px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center;\">\n      <div>\n        <div style=\"display: inline-block; background: #FFC93C; border: 2px solid #2B3440; border-radius: 999px; padding: 6px 18px; font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 1px; margin-bottom: 16px;\">MONEY SKILLS<\u002Fdiv>\n        <h2 style=\"font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 40px; margin: 0 0 14px; color: #2B3440;\">กำไรทุกบาท จบที่ซอง 3 ใบ<\u002Fh2>\n        <p style=\"font-size: 17px; line-height: 1.7; margin: 0 0 30px; color: #4A5563;\">เด็กไม่ได้ \"เรียนวิชาออมเงิน\" — เขาบริหารกำไรที่หามาเองกับมือ ตามหลัก <strong>Earn–Save–Spend–Share<\u002Fstrong> ที่ใช้สอนเด็กหลายล้านคนทั่วโลก<\u002Fp>\n        <div style=\"display: flex; flex-direction: column; gap: 16px;\">\n          <div style=\"display: flex; gap: 16px; align-items: flex-start; background: #FFFFFF; border: 3px solid #2B3440; border-radius: 18px; padding: 18px 20px; box-shadow: 4px 4px 0 #0E8A7B;\">\n            <span style=\"font-size: 30px;\">🏦<\u002Fspan>\n            <div>\n              <div style=\"font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 18px; color: #2B3440;\">ซองออม — อย่างน้อยครึ่งหนึ่ง<\u002Fdiv>\n              <p style=\"margin: 4px 0 0; font-size: 14.5px; line-height: 1.6; color: #4A5563;\">เข้ากระปุกหรือบัญชีของลูก พร้อมเป้าหมายที่เด็กตั้งเอง<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 16px; align-items: flex-start; background: #FFFFFF; border: 3px solid #2B3440; border-radius: 18px; padding: 18px 20px; box-shadow: 4px 4px 0 #FFC93C;\">\n            <span style=\"font-size: 30px;\">🎁<\u002Fspan>\n            <div>\n              <div style=\"font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 18px; color: #2B3440;\">ซองใช้ — รางวัลความพยายาม<\u002Fdiv>\n              <p style=\"margin: 4px 0 0; font-size: 14.5px; line-height: 1.6; color: #4A5563;\">ใช้ได้เลยอย่างภูมิใจ เพราะเป็นเงินที่หามาด้วยตัวเอง<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 16px; align-items: flex-start; background: #FFFFFF; border: 3px solid #2B3440; border-radius: 18px; padding: 18px 20px; box-shadow: 4px 4px 0 #F2703A;\">\n            <span style=\"font-size: 30px;\">❤️<\u002Fspan>\n            <div>\n              <div style=\"font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 18px; color: #2B3440;\">ซองแบ่งปัน — ทีมเลือกเอง<\u002Fdiv>\n              <p style=\"margin: 4px 0 0; font-size: 14.5px; line-height: 1.6; color: #4A5563;\">โหวตกันในทีมว่าจะส่งต่อให้ใคร — ธุรกิจที่ดีต้องคืนอะไรให้สังคม<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position: relative;\">\n        <div style=\"position: absolute; top: -20px; left: -18px; width: 60px; height: 60px; border-radius: 50%; background: #0E8A7B; border: 3px solid #2B3440; z-index: 2; display: grid; place-items: center; font-size: 26px; animation: bob 5s ease-in-out infinite;\">💰<\u002Fdiv>\n        <div style=\"border: 3px solid #2B3440; border-radius: 28px; box-shadow: 8px 8px 0 #0E8A7B; overflow: hidden; background: #FFF3D6; width: 100%; aspect-ratio: 4 / 3.6;\">\n          <image-slot id=\"money-photo\" shape=\"rect\" placeholder=\"รูปเด็กแบ่งเงินใส่ซอง 3 ใบ\"><\u002Fimage-slot>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOR PARENTS -->\n  <section data-screen-label=\"For Parents\" style=\"background: #FFF3D6; padding: 90px 24px 80px; border-top: 3px solid #2B3440; border-bottom: 3px solid #2B3440;\">\n    <div style=\"max-width: 1140px; margin: 0 auto;\">\n      <div style=\"text-align: center; margin-bottom: 52px;\">\n        <div style=\"display: inline-block; background: #F2703A; color: #FFF9EE; border: 2px solid #2B3440; border-radius: 999px; padding: 6px 18px; font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 1px; margin-bottom: 16px;\">FOR PARENTS<\u002Fdiv>\n        <h2 style=\"font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 40px; margin: 0; color: #2B3440;\">สิ่งที่คุณจะได้เห็น — ไม่ใช่แค่ใบประกาศ<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; margin-bottom: 56px;\">\n        <div style=\"background: #FFFFFF; border: 3px solid #2B3440; border-radius: 20px; padding: 24px 20px; text-align: center;\">\n          <div style=\"font-size: 38px; margin-bottom: 10px;\">🎤<\u002Fdiv>\n          <div style=\"font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 18px; color: #2B3440;\">ลูกกล้าขึ้นเวที<\u002Fdiv>\n          <p style=\"margin: 8px 0 0; font-size: 14px; line-height: 1.6; color: #4A5563;\">pitch ธุรกิจของตัวเองต่อหน้าคนแปลกหน้า ด้วยภาษาของเขาเอง<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #FFFFFF; border: 3px solid #2B3440; border-radius: 20px; padding: 24px 20px; text-align: center;\">\n          <div style=\"font-size: 38px; margin-bottom: 10px;\">📒<\u002Fdiv>\n          <div style=\"font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 18px; color: #2B3440;\">สมุดบัญชีเล่มแรก<\u002Fdiv>\n          <p style=\"margin: 8px 0 0; font-size: 14px; line-height: 1.6; color: #4A5563;\">บันทึกต้นทุน–รายรับ–กำไร ที่ลูกเขียนเองทุกบรรทัด<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #FFFFFF; border: 3px solid #2B3440; border-radius: 20px; padding: 24px 20px; text-align: center;\">\n          <div style=\"font-size: 38px; margin-bottom: 10px;\">📸<\u002Fdiv>\n          <div style=\"font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 18px; color: #2B3440;\">ภาพวันเปิดร้าน<\u002Fdiv>\n          <p style=\"margin: 8px 0 0; font-size: 14px; line-height: 1.6; color: #4A5563;\">วิดีโอและรูปตอนลูกเชียร์ขาย ต่อรอง และนับเงิน<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #FFFFFF; border: 3px solid #2B3440; border-radius: 20px; padding: 24px 20px; text-align: center;\">\n          <div style=\"font-size: 38px; margin-bottom: 10px;\">🌱<\u002Fdiv>\n          <div style=\"font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 18px; color: #2B3440;\">นิสัยการออม<\u002Fdiv>\n          <p style=\"margin: 8px 0 0; font-size: 14px; line-height: 1.6; color: #4A5563;\">เป้าหมายการออมที่ลูกตั้งเอง พร้อมเงินก้อนแรกจากน้ำพักน้ำแรง<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 26px;\">\n        <figure style=\"margin: 0; background: #FFFFFF; border: 3px solid #2B3440; border-radius: 22px; padding: 28px 30px; box-shadow: 5px 5px 0 #FFC93C;\">\n          <div style=\"font-size: 22px; color: #FFC93C; letter-spacing: 3px; margin-bottom: 10px;\">★★★★★<\u002Fdiv>\n          <blockquote style=\"margin: 0; font-size: 16.5px; line-height: 1.7; color: #2B3440;\">\"ลูกกลับบ้านมาเล่าเรื่องต้นทุนกับกำไรให้ฟังทั้งคืน — ไม่เคยเห็นเขาตื่นเต้นกับการเรียนแบบนี้มาก่อน\"<\u002Fblockquote>\n          <figcaption style=\"margin-top: 14px; font-weight: 700; font-size: 14px; color: #6B7684;\">คุณแม่น้องภูมิ · ป.5 โรงเรียนสองภาษา<\u002Ffigcaption>\n        <\u002Ffigure>\n        <figure style=\"margin: 0; background: #FFFFFF; border: 3px solid #2B3440; border-radius: 22px; padding: 28px 30px; box-shadow: 5px 5px 0 #0E8A7B;\">\n          <div style=\"font-size: 22px; color: #FFC93C; letter-spacing: 3px; margin-bottom: 10px;\">★★★★★<\u002Fdiv>\n          <blockquote style=\"margin: 0; font-size: 16.5px; line-height: 1.7; color: #2B3440;\">\"สิ่งที่ประทับใจที่สุดไม่ใช่กำไร แต่คือตอนลูกสาวขี้อายของเราลุกขึ้น pitch หน้าเวทีเป็นภาษาอังกฤษ\"<\u002Fblockquote>\n          <figcaption style=\"margin-top: 14px; font-weight: 700; font-size: 14px; color: #6B7684;\">คุณพ่อน้องพราว · Grade 6 โรงเรียนนานาชาติ<\u002Ffigcaption>\n        <\u002Ffigure>\n      <\u002Fdiv>\n      <p style=\"text-align: center; margin: 26px 0 0; font-size: 12.5px; color: #8B94A3;\">* ข้อความตัวอย่างเพื่อการออกแบบ prototype — จะแทนที่ด้วยรีวิวจริงหลังรอบ Pilot<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FAQ -->\n  <section id=\"faq\" data-screen-label=\"FAQ\" style=\"background: #FFF9EE; padding: 90px 24px 80px;\">\n    <div style=\"max-width: 820px; margin: 0 auto;\">\n      <div style=\"text-align: center; margin-bottom: 44px;\">\n        <div style=\"display: inline-block; background: #FFC93C; border: 2px solid #2B3440; border-radius: 999px; padding: 6px 18px; font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 1px; margin-bottom: 16px;\">FAQ<\u002Fdiv>\n        <h2 style=\"font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 40px; margin: 0; color: #2B3440;\">คำถามที่ผู้ปกครองถามบ่อย<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n        <sc-for list=\"{{ faqs }}\" as=\"faq\" hint-placeholder-count=\"5\">\n          <div style=\"background: #FFFFFF; border: 3px solid #2B3440; border-radius: 18px; overflow: hidden;\">\n            <button sc-camel-on-click=\"{{ faq.toggle }}\" style=\"width: 100%; display: flex; justify-content: space-between; align-items: center; gap: 16px; background: none; border: none; cursor: pointer; padding: 18px 22px; text-align: left; font-family: 'Mitr', sans-serif; font-weight: 600; font-size: 17.5px; color: #2B3440;\">\n              <span>{{ faq.q }}<\u002Fspan>\n              <span style=\"width: 30px; height: 30px; border-radius: 50%; background: #FFC93C; border: 2px solid #2B3440; display: grid; place-items: center; font-size: 16px; font-weight: 700; flex-shrink: 0;\">{{ faq.icon }}<\u002Fspan>\n            <\u002Fbutton>\n            <sc-if value=\"{{ faq.open }}\" hint-placeholder-val=\"{{ false }}\">\n              <p style=\"margin: 0; padding: 0 22px 20px; font-size: 15.5px; line-height: 1.75; color: #4A5563;\">{{ faq.a }}<\u002Fp>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CTA -->\n  <section id=\"cta\" data-screen-label=\"CTA\" style=\"background: #0E8A7B; padding: 90px 24px; border-top: 3px solid #2B3440; position: relative; overflow: hidden;\">\n    <div style=\"position: absolute; top: -40px; left: -40px; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,249,238,0.12);\"><\u002Fdiv>\n    <div style=\"position: absolute; bottom: -60px; right: -30px; width: 220px; height: 220px; border-radius: 50%; background: rgba(255,201,60,0.25);\"><\u002Fdiv>\n    <div style=\"max-width: 760px; margin: 0 auto; text-align: center; position: relative;\">\n      <div style=\"font-size: 46px; margin-bottom: 14px;\">🍋💸🏪<\u002Fdiv>\n      <h2 style=\"font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 42px; line-height: 1.25; margin: 0 0 18px; color: #FFF9EE;\">Workshop รุ่นแรก เปิดรับเพียง 18 ที่นั่ง<\u002Fh2>\n      <p style=\"font-size: 18px; line-height: 1.7; margin: 0 0 32px; color: #DCF2EC;\">ให้วันเสาร์หนึ่งวันของลูก เป็นวันที่เขาได้เป็นเจ้าของธุรกิจครั้งแรกในชีวิต — พร้อมบทเรียนเรื่องเงินที่จะติดตัวไปตลอด<\u002Fp>\n      <a href=\"#\" style=\"display: inline-block; background: #FFC93C; color: #2B3440; font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 20px; padding: 17px 44px; border-radius: 999px; border: 3px solid #2B3440; box-shadow: 5px 5px 0 #2B3440;\" style-hover=\"transform: translate(3px,3px); box-shadow: 2px 2px 0 #2B3440; color: #2B3440;\">จองที่นั่ง / สอบถามรอบเรียน<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer data-screen-label=\"Footer\" style=\"background: #2B3440; color: #C7CEDA; padding: 56px 24px 40px;\">\n    <div style=\"max-width: 1140px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px;\">\n      <div>\n        <div style=\"display: flex; align-items: center; gap: 10px; margin-bottom: 14px;\">\n          <span style=\"width: 38px; height: 38px; border-radius: 50%; background: #FFC93C; border: 2.5px solid #FFF9EE; display: grid; place-items: center; font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 19px; color: #2B3440;\">฿<\u002Fspan>\n          <span style=\"font-family: 'Mitr', sans-serif; font-weight: 700; font-size: 20px; color: #FFF9EE;\">KidBiz Academy<\u002Fspan>\n          <span style=\"font-size: 12px; color: #8B94A3;\">(ชื่อชั่วคราว)<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin: 0; font-size: 14.5px; line-height: 1.8;\">โรงเรียนธุรกิจและทักษะการเงินสำหรับเด็ก 9–13 ปี<br>กรุงเทพมหานคร · <a href=\"mailto:hello@kidbiz.example\" style=\"color: #FFC93C;\">hello@kidbiz.example<\u002Fa><\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p style=\"margin: 0 0 8px; font-size: 14.5px; line-height: 1.8;\"><strong style=\"color: #FFF9EE;\">โปรแกรม:<\u002Fstrong> My First Business Day · Young Founder · School Program<\u002Fp>\n        <p style=\"margin: 0; font-size: 14.5px; line-height: 1.8;\">สอนสองภาษา ไทย–อังกฤษ สำหรับครอบครัว EP / Bilingual / International<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width: 1140px; margin: 36px auto 0; padding-top: 22px; border-top: 1px solid #465061; font-size: 12.5px; color: #8B94A3;\">\n      ⚠️ PROTOTYPE — เว็บไซต์ตัวอย่างเพื่อนำเสนอแนวคิด ยังไม่เปิดให้บริการจริง · ข้อมูลราคาและรีวิวเป็นตัวอย่างประกอบการออกแบบ\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<div style=\"width: 0; height: 0; overflow: hidden; position: absolute;\">\n  <x-import component-from-global-scope=\"image-slot\" from=\"204464d4-c69f-4967-959f-a2aad24c75af#/image-slot.js\" hint-size=\"0,0\"><\u002Fx-import>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;showPilotBanner&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Content&quot; },\n  &quot;showStats&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Content&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { openFaq: 0 };\n\n  renderVals() {\n    const showPilotBanner = this.props.showPilotBanner ?? true;\n    const showStats = this.props.showStats ?? true;\n\n    const steps = [\n      { n: '1', emoji: '💛', title: 'ค้นหาสิ่งที่รัก', desc: 'ธุรกิจของเด็กต้องงอกจากตัวตนและสิ่งที่เขาสนใจ — ไม่ใช่หยิบของมาขายต่อ' },\n      { n: '2', emoji: '💡', title: 'ปั้นไอเดียแก้ปัญหา', desc: 'สินค้า/บริการต้องตอบคำถามเดียว: \"มันช่วยใคร?\" — จุดเริ่มของ mindset ผู้ประกอบการ' },\n      { n: '3', emoji: '🎨', title: 'สร้างแบรนด์ + คิดเลข', desc: 'ตั้งชื่อร้าน ออกแบบป้าย คำนวณต้นทุน–ราคาขาย และ pitch ขอเงินกู้จาก \"ธนาคาร\"' },\n      { n: '4', emoji: '🏪', title: 'เปิดร้านขายจริง', desc: 'Market Day กับลูกค้าตัวจริง เงินจริง การต่อราคาจริง — สนามที่ปลอดภัยแต่ไม่หลอก' },\n      { n: '5', emoji: '🧮', title: 'นับเงิน คืนหนี้ แบ่งกำไร', desc: 'คืนเงินกู้ก่อน ที่เหลือคือกำไรของเด็ก — บทเรียนเรื่องหนี้และกำไรที่จำไปทั้งชีวิต' },\n      { n: '6', emoji: '🎤', title: 'ขึ้นเวทีเล่าเรื่อง', desc: 'ปิดท้ายด้วย pitch สั้น ๆ ต่อหน้าครอบครัว: ธุรกิจฉันคืออะไร และฉันได้เรียนรู้อะไร' },\n    ];\n\n    const faqData = [\n      { q: 'ลูกขี้อาย ไม่กล้าขายของ จะเรียนได้ไหม?', a: 'ได้แน่นอน — ในทีมมี 4 บทบาท (CEO / การเงิน / ผลิต / ขาย) เด็กที่ถนัดอยู่หลังบ้านจะได้เรียนรู้ครบเท่ากัน และเรามักพบว่าเด็กขี้อายคือคนที่เปลี่ยนแปลงชัดที่สุดเมื่อร้าน \"ของเขาเอง\" เริ่มมีลูกค้า' },\n      { q: 'สอนเป็นภาษาอะไร?', a: 'สองภาษาไทย–อังกฤษ ออกแบบมาสำหรับเด็ก EP / Bilingual / International โดยเฉพาะ — ศัพท์ธุรกิจหลัก (profit, cost, budget) ใช้ภาษาอังกฤษ ส่วนการโค้ชใช้ภาษาที่เด็กสบายใจที่สุด' },\n      { q: 'เงินกำไรเป็นของใคร?', a: 'ของเด็ก 100% หลังคืน \"เงินกู้ธนาคาร\" — และเด็กจะเป็นคนแบ่งเองใส่ซองออม / ใช้ / แบ่งปัน นี่คือหัวใจของบทเรียน ทีมที่ขาดทุนก็มีค่าแรงเชิงสัญลักษณ์กลับบ้าน ไม่มีใครกลับมือเปล่า' },\n      { q: 'ผู้ปกครองต้องอยู่ด้วยทั้งวันไหม?', a: 'ไม่ต้อง — ส่งลูกตอนเช้า แล้วกลับมาช่วงบ่าย (ประมาณ 14:00) ในบท \"ลูกค้า\" ของ Market Day พร้อมคูปองที่รวมอยู่ในค่าคอร์สแล้ว กติกาเดียวคือ ห้ามอุดหนุนร้านลูกตัวเองเกิน 1 ครั้ง' },\n      { q: 'ถ้าร้านของลูกขาดทุนล่ะ?', a: 'นั่นอาจเป็นบทเรียนที่คุ้มที่สุดของวัน — เราออกแบบ debrief ให้ความล้มเหลวเล็กพอที่ปลอดภัย แต่จริงพอที่จะจำ เด็กจะสรุปเองว่าครั้งหน้าจะทำอะไรต่าง และนั่นคือทักษะที่โรงเรียนไหนก็ไม่ได้สอน' },\n    ];\n\n    const faqs = faqData.map((f, i) => ({\n      ...f,\n      open: this.state.openFaq === i,\n      icon: this.state.openFaq === i ? '−' : '+',\n      toggle: () => this.setState(s => ({ openFaq: s.openFaq === i ? -1 : i })),\n    }));\n\n    return { showPilotBanner, showStats, steps, faqs };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
